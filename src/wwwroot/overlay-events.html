<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Event Display Overlay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/overlay-base.css" />
    <link rel="stylesheet" href="/css/overlay-events.css" />
</head>
<body>
    <div class="container">
        <div id="slot-primary" class="event-slot hidden">
            <div class="event-row">
                <div class="event-logo-container"></div>
                <div class="event-info-text">
                    <h1 class="event-full-name"></h1>
                    <h1 class="event-round-label"></h1>
                </div>
            </div>
            <h3 class="event-group-label"></h3>
        </div>

        <div id="slot-secondary" class="event-slot hidden">
            <div class="event-row">
                <div class="event-logo-container"></div>
                <div class="event-info-text">
                    <h1 class="event-full-name"></h1>
                    <h1 class="event-round-label"></h1>
                </div>
            </div>
            <h3 class="event-group-label"></h3>
        </div>

        <div id="slot-tertiary" class="event-slot hidden">
            <div class="event-row">
                <div class="event-logo-container"></div>
                <div class="event-info-text">
                    <h1 class="event-full-name"></h1>
                    <h1 class="event-round-label"></h1>
                </div>
            </div>
            <h3 class="event-group-label"></h3>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr/dist/browser/signalr.min.js"></script>
    <script type="module" src="/js/overlay-events.js"></script>
</body>
</html>
